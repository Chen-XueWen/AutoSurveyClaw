search_plan:
  exclusion_criteria:
  - Static graph topology assumptions without dynamic learning
  - Fixed-grid CNNs only
  - Complexity claims without empirical scaling plots
  goal: Unified taxonomy and decision framework
  inclusion_criteria:
  - Permutation Invariance or Equivariance proven
  - Variable-size input support
  - Empirical validation on listed benchmarks
  search_themes:
  - id: 1
    name: Core Theoretical Constraints
    query: ('"permutation invariance" OR "permutation equivariance"') AND ('"neural
      network" OR "deep learning"')
  - id: 2
    name: Architectural Mechanisms
    query: '"Deep Sets" OR "PointNet" OR "Set Transformer" OR "Dynamic Graph CNN"'
  - id: 3
    name: Application Domains
    query: '"point cloud" OR "particle physics" OR "multi-agent" OR "graph neural
      network"'
  - id: 4
    name: Scalability & Complexity
    query: '"cardinality" OR "O(N^2)" OR "scalability" OR "computational efficiency"'
  - id: 5
    name: Benchmarks & Evaluation
    query: '"benchmark" OR "ShapeNet" OR "ModelNet40" OR "MoleculeNet"'
  target_count: 60-100 papers
  timeline: 2 weeks
  topic: Neural Architectures for Set-Structured Data
